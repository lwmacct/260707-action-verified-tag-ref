name: "Verify Tag Ref"
description: "Verify a source repository tag, optional SHA, base reachability, and optional checkout HEAD"
author: "lwmacct"
inputs:
  source-repository:
    description: "Repository that owns the source tag, in owner/repo format. Defaults to the current repository."
    required: false
  source-tag:
    description: "Source release tag. Defaults to the current tag ref when running from a tag push."
    required: false
  source-sha:
    description: "Optional expected source commit SHA. When empty, the tag target commit is used."
    required: false
  source-base-ref:
    description: "Branch or ref that the source commit must be reachable from. Defaults to the source repository default branch."
    required: false
  source-path:
    description: "Optional local git repository path. When empty, the action verifies by fetching source-repository into a temporary directory."
    required: false
  checkout-path:
    description: "Optional local checkout path whose HEAD must equal the verified source SHA."
    required: false
  token:
    description: "GitHub token used to read source repository metadata and fetch private repositories."
    default: ${{ github.token }}
    required: false
  fetch:
    description: "Set to true to fetch tag and base ref when source-path is provided. Remote mode always fetches."
    default: "true"
    required: false
  validate-reachable:
    description: "Set to true to require the source commit to be reachable from source-base-ref."
    default: "true"
    required: false
  require-tag:
    description: "Set to true to fail when no source tag can be resolved."
    default: "true"
    required: false
  tag-pattern:
    description: "Optional glob pattern that source-tag must match, for example v*."
    required: false
  summary:
    description: "Set to true to write a GitHub step summary."
    default: "true"
    required: false
outputs:
  source-repository:
    description: "Resolved source repository."
  source-tag:
    description: "Validated source tag."
  source-sha:
    description: "Resolved trusted source commit SHA."
  sha:
    description: "Alias of source-sha."
  tag-sha:
    description: "Commit SHA resolved from the tag."
  base-ref:
    description: "Local base ref used for reachability validation."
  base-sha:
    description: "Commit SHA resolved from base-ref."
  checkout-sha:
    description: "Checkout HEAD SHA when checkout-path is provided."
  source-path:
    description: "Local path used for source git verification."
branding:
  icon: "check-circle"
  color: "green"
runs:
  using: "node24"
  main: "dist/index.js"
