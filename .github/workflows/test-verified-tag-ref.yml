name: Test Verified Tag Ref

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test-verified-tag-ref.yml"
      - "action.yml"
      - "dist/**"
  pull_request:
    paths:
      - ".github/workflows/test-verified-tag-ref.yml"
      - "action.yml"
      - "dist/**"

permissions:
  contents: read

jobs:
  verify:
    name: Verify local test tags
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create local test tags
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --no-sign -f v0.0.0-lightweight HEAD
          git tag --no-sign -f -a v0.0.0-annotated HEAD -m "test annotated tag"

      - name: Verify lightweight tag
        id: lightweight
        uses: ./
        with:
          source-path: .
          checkout-path: .
          source-tag: v0.0.0-lightweight
          source-sha: ${{ github.sha }}
          source-base-ref: HEAD
          fetch: "false"
          tag-pattern: "v*"

      - name: Verify annotated tag
        id: annotated
        uses: ./
        with:
          source-path: .
          checkout-path: .
          source-tag: v0.0.0-annotated
          source-base-ref: HEAD
          fetch: "false"
          tag-pattern: "v*"

      - name: Verify outputs
        env:
          LIGHTWEIGHT_SOURCE_REPOSITORY: ${{ steps.lightweight.outputs.source-repository }}
          LIGHTWEIGHT_SOURCE_TAG: ${{ steps.lightweight.outputs.source-tag }}
          LIGHTWEIGHT_SHA: ${{ steps.lightweight.outputs.sha }}
          LIGHTWEIGHT_TAG_SHA: ${{ steps.lightweight.outputs.tag-sha }}
          LIGHTWEIGHT_CHECKOUT_SHA: ${{ steps.lightweight.outputs.checkout-sha }}
          LIGHTWEIGHT_BASE_REF: ${{ steps.lightweight.outputs.base-ref }}
          ANNOTATED_SHA: ${{ steps.annotated.outputs.sha }}
          ANNOTATED_TAG_SHA: ${{ steps.annotated.outputs.tag-sha }}
          EXPECTED_SHA: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test "${LIGHTWEIGHT_SOURCE_REPOSITORY}" = "${EXPECTED_REPOSITORY}"
          test "${LIGHTWEIGHT_SOURCE_TAG}" = "v0.0.0-lightweight"
          test "${LIGHTWEIGHT_SHA}" = "${EXPECTED_SHA}"
          test "${LIGHTWEIGHT_TAG_SHA}" = "${EXPECTED_SHA}"
          test "${LIGHTWEIGHT_CHECKOUT_SHA}" = "${EXPECTED_SHA}"
          test "${LIGHTWEIGHT_BASE_REF}" = "HEAD"
          test "${ANNOTATED_SHA}" = "${EXPECTED_SHA}"
          test "${ANNOTATED_TAG_SHA}" = "${EXPECTED_SHA}"
